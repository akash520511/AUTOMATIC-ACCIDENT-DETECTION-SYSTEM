<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Video - Accident Detection</title>
    <link rel="stylesheet" href="/docs/style.css">
</head>
<body>
    <div class="upload-container">
        <h1>📤 Upload Video for Analysis</h1>
        
        <div class="upload-area" id="dropZone">
            <div class="upload-icon">🎥</div>
            <p>Drag & Drop video here or click to browse</p>
            <p class="upload-hint">MP4, AVI, MOV, MKV (Max 500MB)</p>
            <input type="file" id="fileInput" accept="video/*" style="display: none">
            <button onclick="document.getElementById('fileInput').click()">Select Video</button>
        </div>
        
        <div class="progress-bar" id="progressBar" style="display: none;">
            <div class="progress-fill" id="progressFill"></div>
            <span id="progressText">0%</span>
        </div>
        
        <div id="results" class="results"></div>
        
        <a href="/dashboard" class="dashboard-link">← Back to Dashboard</a>
    </div>
    
    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const resultsDiv = document.getElementById('results');
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#3b82f6';
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = '#94a3b8';
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#94a3b8';
            const file = e.dataTransfer.files[0];
            if (file) uploadFile(file);
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) uploadFile(e.target.files[0]);
        });
        
        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);
            
            progressBar.style.display = 'block';
            progressFill.style.width = '0%';
            progressText.textContent = '0%';
            
            const xhr = new XMLHttpRequest();
            
            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const percent = (e.loaded / e.total) * 100;
                    progressFill.style.width = percent + '%';
                    progressText.textContent = Math.round(percent) + '%';
                }
            });
            
            xhr.addEventListener('load', () => {
                progressBar.style.display = 'none';
                const response = JSON.parse(xhr.responseText);
                displayResults(response);
            });
            
            xhr.addEventListener('error', () => {
                progressBar.style.display = 'none';
                resultsDiv.innerHTML = '<div class="error">Upload failed. Please try again.</div>';
            });
            
            xhr.open('POST', '/api/detect/upload');
            xhr.send(formData);
        }
        
        function displayResults(data) {
            if (!data.results) return;
            
            const lastResult = data.results[data.results.length - 1];
            const severity = lastResult.severity;
            
            let severityClass = '';
            let severityText = '';
            
            if (severity.severity === 'HIGH') {
                severityClass = 'severity-high';
                severityText = '🚨 HIGH SEVERITY ACCIDENT DETECTED!';
            } else if (severity.severity === 'MEDIUM') {
                severityClass = 'severity-medium';
                severityText = '⚠️ MEDIUM SEVERITY ACCIDENT';
            } else {
                severityClass = 'severity-low';
                severityText = 'ℹ️ LOW SEVERITY INCIDENT';
            }
            
            let platesHtml = '';
            if (lastResult.plates && lastResult.plates.length > 0) {
                platesHtml = '<div class="plates"><h4>Detected Plates:</h4><ul>';
                lastResult.plates.forEach(plate => {
                    platesHtml += `<li>${plate.plate_number} (${plate.confidence}% confidence)</li>`;
                });
                platesHtml += '</ul></div>';
            }
            
            let victimsHtml = '';
            if (lastResult.victims && lastResult.victims.length > 0) {
                victimsHtml = `<div class="victims"><h4>👥 Victims Detected: ${lastResult.victims.length}</h4></div>`;
            }
            
            resultsDiv.innerHTML = `
                <div class="result-card ${severityClass}">
                    <h3>${severityText}</h3>
                    <div class="result-details">
                        <p><strong>Confidence:</strong> ${severity.confidence}%</p>
                        <p><strong>Vehicles:</strong> ${lastResult.vehicles}</p>
                        <p><strong>Severity Score:</strong> ${severity.severity_score}</p>
                        <p><strong>Factors:</strong> Overlap ${severity.factors.overlap_percentage}%, Speed Drop ${severity.factors.speed_drop_percentage}%</p>
                    </div>
                    ${platesHtml}
                    ${victimsHtml}
                </div>
            `;
        }
    </script>
    
    <style>
        .upload-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            text-align: center;
        }
        
        .upload-area {
            border: 2px dashed #94a3b8;
            border-radius: 15px;
            padding: 40px;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .upload-hint {
            font-size: 12px;
            color: #94a3b8;
            margin: 10px 0;
        }
        
        .progress-bar {
            background: #1e293b;
            border-radius: 10px;
            height: 30px;
            position: relative;
            margin: 20px 0;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border-radius: 10px;
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
        
        .result-card {
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }
        
        .severity-high {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
        }
        
        .severity-medium {
            background: rgba(245, 158, 11, 0.2);
            border: 1px solid #f59e0b;
        }
        
        .severity-low {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid #10b981;
        }
        
        .dashboard-link {
            display: inline-block;
            margin-top: 20px;
            color: #3b82f6;
            text-decoration: none;
        }
        
        button {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }
    </style>
</body>
</html>
